name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          OPENPOOL_HOME: /tmp/openpool-test
        run: go test ./... -race -timeout 120s

      - name: Build
        run: |
          go build -o /dev/null ./cmd/op/
          go build -o /dev/null ./cmd/relay/
          go build -o /dev/null ./cmd/action-tool/
