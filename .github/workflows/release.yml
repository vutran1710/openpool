name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify tag is on main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF")
          MAIN_COMMITS=$(git rev-list origin/main)
          if ! echo "$MAIN_COMMITS" | grep -q "$TAG_COMMIT"; then
            echo "Error: tag must be on main branch"
            exit 1
          fi

      - name: Run tests
        env:
          OPENPOOL_HOME: /tmp/openpool-test
        run: go test ./... -race -timeout 120s

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # op (CLI/TUI)
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/op-linux-amd64       ./cmd/op/
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/op-linux-arm64       ./cmd/op/
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/op-darwin-amd64      ./cmd/op/
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/op-darwin-arm64      ./cmd/op/

          # relay
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/relay-linux-amd64    ./cmd/relay/
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/relay-linux-arm64    ./cmd/relay/

          # action-tool
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/action-tool-linux-amd64 ./cmd/action-tool/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          SHA_DARWIN_ARM64=$(grep op-darwin-arm64 dist/checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep op-darwin-amd64 dist/checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep op-linux-arm64 dist/checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep op-linux-amd64 dist/checksums.txt | awk '{print $1}')

          cat > /tmp/op.rb <<FORMULA
          class Op < Formula
            desc "Decentralized, terminal-native matching platform"
            homepage "https://github.com/vutran1710/openpool"
            version "${VER}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/vutran1710/openpool/releases/download/v#{version}/op-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/vutran1710/openpool/releases/download/v#{version}/op-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/vutran1710/openpool/releases/download/v#{version}/op-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/vutran1710/openpool/releases/download/v#{version}/op-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install Dir["op-*"].first => "op"
            end

            test do
              assert_match "openpool", shell_output("#{bin}/op --help 2>&1", 0)
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/op.rb

          git clone https://x-access-token:${GH_TOKEN}@github.com/vutran1710/homebrew-tap.git /tmp/tap
          cp /tmp/op.rb /tmp/tap/Formula/op.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/op.rb
          git commit -m "bump op to ${VER}"
          git push
