name: Process Registration

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.body, '<!-- registration-request -->')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Download regcrypt
        run: |
          curl -sL https://github.com/vutran1710/regcrypt/releases/latest/download/regcrypt-linux-amd64 -o regcrypt
          chmod +x regcrypt

      - name: Parse and register
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          POOL_SALT: ${{ secrets.POOL_SALT }}
          OPERATOR_PRIVATE_KEY: ${{ secrets.OPERATOR_PRIVATE_KEY }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Extract fields from issue body (between ``` fences after each header)
          PUB_KEY=$(echo "$ISSUE_BODY" | sed -n '/\*\*Public Key:\*\*/,/```/{/```/!p}' | grep -v '^\*\*' | tr -d '[:space:]')
          BLOB_HEX=$(echo "$ISSUE_BODY" | sed -n '/\*\*Profile Blob:\*\*/,/```/{/```/!p}' | grep -v '^\*\*' | tr -d '[:space:]')

          if [ -z "$PUB_KEY" ] || [ -z "$BLOB_HEX" ]; then
            echo "::error::Missing required fields in issue body"
            gh issue comment "$ISSUE_NUMBER" --body "Registration rejected: missing fields."
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
            exit 0
          fi

          # Determine provider + user_id
          REPO_OWNER=$(echo "$REPO" | cut -d/ -f1)
          ISSUE_AUTHOR=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '.user.login')
          CUSTOM_ID=$(echo "$ISSUE_BODY" | sed -n '/\*\*Custom ID:\*\*/,/```/{/```/!p}' | grep -v '^\*\*' | tr -d '[:space:]')

          if [ "$ISSUE_AUTHOR" = "$REPO_OWNER" ] && [ -n "$CUSTOM_ID" ] && echo "$CUSTOM_ID" | grep -q ':'; then
            PROVIDER=$(echo "$CUSTOM_ID" | cut -d: -f1)
            USER_ID=$(echo "$CUSTOM_ID" | cut -d: -f2-)
            echo "Operator registration: provider=$PROVIDER user_id=$USER_ID"
          else
            PROVIDER="github"
            USER_ID="$ISSUE_AUTHOR_ID"
          fi

          # Compute hashes + encrypt for user
          OUTPUT=$(./regcrypt \
            --pool-url "$REPO" \
            --provider "$PROVIDER" \
            --user-id "$USER_ID" \
            --salt "$POOL_SALT" \
            --user-pubkey "$PUB_KEY")

          BIN_HASH=$(echo "$OUTPUT" | sed -n '1p')
          MATCH_HASH=$(echo "$OUTPUT" | sed -n '2p')
          ENCRYPTED_BLOB=$(echo "$OUTPUT" | sed -n '3p')

          # Sign the encrypted blob with operator key
          SIGNATURE=$(echo -n "$ENCRYPTED_BLOB" | base64 -d | ./regcrypt sign --operator-key "$OPERATOR_PRIVATE_KEY")

          # Write .bin file only — indexer runs separately via cron
          mkdir -p users
          echo "$BLOB_HEX" | xxd -r -p > "users/${BIN_HASH}.bin"

          # Commit and push (with retry for concurrent registrations)
          git config user.name "dating-bot"
          git config user.email "bot@dating-pool.dev"
          git add "users/${BIN_HASH}.bin"
          git commit -m "Register user ${BIN_HASH}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done

          # Close issue first, then post signed comment (close-before-comment ordering)
          gh issue close "$ISSUE_NUMBER" --reason completed
          gh issue comment "$ISSUE_NUMBER" --body "${ENCRYPTED_BLOB}.${SIGNATURE}"

      - name: Handle failure
        if: failure()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Registration failed. Please retry."
          gh issue close "$ISSUE_NUMBER" --reason "not planned"
