name: Squash History

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:      # manual trigger

jobs:
  squash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for squash

      - name: Squash if needed
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_COMMIT_COUNT: ${{ vars.MAX_COMMIT_COUNT || '50' }}
        run: |
          set -euo pipefail

          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "Current commits: $COMMIT_COUNT (max: $MAX_COMMIT_COUNT)"

          if [ "$COMMIT_COUNT" -le "$MAX_COMMIT_COUNT" ]; then
            echo "Under threshold. Skipping."
            exit 0
          fi

          echo "Squashing $COMMIT_COUNT commits into 1..."

          git checkout --orphan squashed
          git add -A
          git config user.name "openpool-bot"
          git config user.email "bot@openpool.dev"
          git commit -m "Pool state (squashed $(date -u +%Y-%m-%dT%H:%M:%SZ))"

          git push --force origin squashed:main

          echo "History squashed: $COMMIT_COUNT commits → 1"
