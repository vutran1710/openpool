name: Squash History

on:
  schedule:
    - cron: '0 0 * * 0'  # weekly, Sunday midnight UTC
  workflow_dispatch:      # manual trigger

jobs:
  squash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for squash

      - name: Squash to single commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Count commits
          COMMIT_COUNT=$(git rev-list --count HEAD)
          if [ "$COMMIT_COUNT" -le 1 ]; then
            echo "Already squashed (1 commit). Skipping."
            exit 0
          fi

          echo "Squashing $COMMIT_COUNT commits into 1..."

          # Create orphan branch with current tree
          git checkout --orphan squashed
          git add -A
          git config user.name "openpool-bot"
          git config user.email "bot@openpool.dev"
          git commit -m "Pool state (squashed $(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Force push to main
          git push --force origin squashed:main

          echo "History squashed: $COMMIT_COUNT commits → 1"
